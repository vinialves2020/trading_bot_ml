version: '3.8'

services:
  trading-bot:
    build: .
    container_name: oraculo_btc_bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data  # Sincroniza a pasta data do container com a AWS

  dashboard:
    build: .
    container_name: oraculo_dashboard
    restart: unless-stopped
    # Roda o Streamlit em vez do bot
    command: streamlit run src/dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501" # Expõe a porta para a internet
    volumes:
      - ./data:/app/data  # Lê a mesma pasta que o bot escreve
    depends_on:
      - trading-bot